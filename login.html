<!-- login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - YonkiVN 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="center-layout">
    <div class="cyber-bg"></div>
    <div class="auth-panel glass-panel fade-in">
        <h1>YONKIVN <span class="neon-blue">GATE</span></h1>
        <h2>XÁC THỰC DANH TÍNH</h2>
        <form onsubmit="loginUser(event)">
            <input type="text" id="loginId" placeholder="Mã ID Game / TikTok" required>
            <input type="password" id="loginPass" placeholder="Khóa bảo mật (Mật khẩu)" required>
            <button type="submit" class="btn-cyber" id="loginBtn">TRUY CẬP HỆ THỐNG</button>
        </form>
        <a href="register.html" class="switch-link">>> Thiết lập hồ sơ mới <<</a>
    </div>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
